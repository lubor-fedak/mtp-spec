name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mtp-lint:
    name: mtp-lint tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install mtp-lint
        run: pip install -e "tools/mtp-lint[dev]"
      - name: Run tests
        run: pytest tools/mtp-lint/tests/ -v --tb=short
      - name: Validate example package
        run: mtp-lint check examples/churn-risk-scoring-v0.2.yaml --format json

  mtp-run:
    name: mtp-run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install mtp-run
        run: pip install -e "tools/mtp-run[dev]"
      - name: Run tests
        run: pytest tools/mtp-run/tests/ -v --tb=short
      - name: Execute mock run
        run: |
          mtp-run exec examples/churn-risk-scoring-v0.2.yaml \
            --data examples/test-data-churn.csv \
            --adapter mock -q --format json > /dev/null

  mtp-conformance:
    name: mtp-conformance tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tools
        run: |
          pip install -e tools/mtp-lint
          pip install -e tools/mtp-run
          pip install -e tools/mtp-registry
          pip install -e "tools/mtp-conformance[dev]"
      - name: Run tests
        run: pytest tools/mtp-conformance/tests/ -v --tb=short

  mtp-registry:
    name: mtp-registry tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install mtp-registry
        run: pip install -e "tools/mtp-registry[dev]"
      - name: Run tests
        run: pytest tools/mtp-registry/tests/ -v --tb=short
      - name: Verify example registry artifacts
        env:
          MTP_REGISTRY_SIGNING_KEY: mtp-example-registry-key-v0.6
        run: |
          mtp-registry verify examples/churn-risk-scoring-v0.2.yaml \
            --signature examples/registry/signatures/b2c3d4e5-f6a7-8901-bcde-f12345678901/1.0.0/churn-risk-scoring.signature.v0.6.yaml \
            --key-env MTP_REGISTRY_SIGNING_KEY
          mtp-registry check-entry \
            examples/registry/entries/customer-churn-risk-scoring-1.0.0.registry-entry.yaml \
            --registry-dir examples/registry \
            --key-env MTP_REGISTRY_SIGNING_KEY

  conformance-levels:
    name: conformance-${{ matrix.level }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        level: ["l1", "l2", "l3"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: |
          pip install -e tools/mtp-lint
          pip install -e tools/mtp-run
          pip install -e tools/mtp-registry
          pip install -e tools/mtp-conformance
      - name: Run conformance
        run: |
          mtp-conformance run --level ${{ matrix.level }} --format json

  schema-validation:
    name: Schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: |
          pip install -e tools/mtp-lint
          pip install -e tools/mtp-run
      - name: Validate all examples
        run: |
          mtp-lint validate examples/churn-risk-scoring-v0.2.yaml
          mtp-lint validate examples/valuation-report-extraction.yaml
          mtp-lint validate examples/churn-risk-scoring-execution-report-v0.2.yaml
          mtp-lint validate examples/churn-risk-scoring-mock-execution-report-v0.2.yaml
