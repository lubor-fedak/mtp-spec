name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mtp-lint:
    name: mtp-lint tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install mtp-lint
        run: pip install -e "tools/mtp-lint[dev]"
      - name: Run tests
        run: pytest tools/mtp-lint/tests/ -v --tb=short
      - name: Validate example package
        run: mtp-lint check examples/churn-risk-scoring-v0.2.yaml --format json

  mtp-run:
    name: mtp-run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install mtp-run
        run: pip install -e "tools/mtp-run[dev]"
      - name: Run tests
        run: pytest tools/mtp-run/tests/ -v --tb=short
      - name: Execute mock run
        run: |
          mtp-run exec examples/churn-risk-scoring-v0.2.yaml \
            --data examples/test-data-churn.csv \
            --adapter mock -q --format json > /dev/null

  mtp-extract:
    name: mtp-extract tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tools
        run: |
          pip install -e tools/mtp-lint
          pip install -e "tools/mtp-extract[dev]"
      - name: Run tests
        run: pytest tools/mtp-extract/tests/ -v --tb=short
      - name: Extract reference draft
        run: |
          mtp-extract draft examples/conversations/churn-risk-scoring-session.md \
            --name "Customer Churn Risk Scoring Draft" \
            --author analytics-team \
            --source-platform claude-sonnet-4 \
            --precheck \
            -o /tmp/churn-risk-scoring-draft.yaml
          mtp-lint validate /tmp/churn-risk-scoring-draft.yaml

  mtp-benchmark:
    name: mtp-benchmark tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tools
        run: |
          pip install -e tools/mtp-run
          pip install -e "tools/mtp-benchmark[dev]"
      - name: Run tests
        run: pytest tools/mtp-benchmark/tests/ -v --tb=short
      - name: Run reference benchmark
        run: |
          mtp-benchmark run examples/benchmarks/churn-risk-benchmark-suite-v0.7.yaml \
            --output-dir /tmp/mtp-benchmark
          mtp-benchmark validate /tmp/mtp-benchmark/churn-risk-benchmark-result-v0.7.yaml

  mtp-release:
    name: mtp-release tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tools
        run: |
          pip install -e tools/mtp-lint
          pip install -e tools/mtp-run
          pip install -e tools/mtp-registry
          pip install -e tools/mtp-conformance
          pip install -e tools/mtp-benchmark
          pip install -e "tools/mtp-release[dev]"
      - name: Run tests
        run: pytest tools/mtp-release/tests/ -v --tb=short
      - name: Build release artifacts
        run: |
          mtp-release matrix \
            --benchmark-result examples/benchmarks/churn-risk-benchmark-result-v0.7.yaml \
            --certification examples/benchmarks/mock-adapter-certification-v0.7.yaml \
            --output /tmp/mtp-release/mtp-provider-matrix-v1.0.yaml
          mtp-release validate /tmp/mtp-release/mtp-provider-matrix-v1.0.yaml
          mtp-release contract \
            --release-version 1.0.0 \
            --provider-matrix /tmp/mtp-release/mtp-provider-matrix-v1.0.yaml \
            --conformance-level all \
            --architecture-ref docs/enterprise-reference-architecture-v1.0.md \
            --output /tmp/mtp-release/mtp-compatibility-contract-v1.0.yaml
          mtp-release validate /tmp/mtp-release/mtp-compatibility-contract-v1.0.yaml

  mtp-conformance:
    name: mtp-conformance tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tools
        run: |
          pip install -e tools/mtp-lint
          pip install -e tools/mtp-run
          pip install -e tools/mtp-registry
          pip install -e "tools/mtp-conformance[dev]"
      - name: Run tests
        run: pytest tools/mtp-conformance/tests/ -v --tb=short

  mtp-registry:
    name: mtp-registry tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install mtp-registry
        run: pip install -e "tools/mtp-registry[dev]"
      - name: Run tests
        run: pytest tools/mtp-registry/tests/ -v --tb=short
      - name: Verify example registry artifacts
        env:
          MTP_REGISTRY_SIGNING_KEY: mtp-example-registry-key-v0.6
        run: |
          mtp-registry verify examples/churn-risk-scoring-v0.2.yaml \
            --signature examples/registry/signatures/b2c3d4e5-f6a7-8901-bcde-f12345678901/1.0.0/churn-risk-scoring.signature.v0.6.yaml \
            --key-env MTP_REGISTRY_SIGNING_KEY
          mtp-registry check-entry \
            examples/registry/entries/customer-churn-risk-scoring-1.0.0.registry-entry.yaml \
            --registry-dir examples/registry \
            --key-env MTP_REGISTRY_SIGNING_KEY

  conformance-levels:
    name: conformance-${{ matrix.level }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        level: ["l1", "l2", "l3"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: |
          pip install -e tools/mtp-lint
          pip install -e tools/mtp-run
          pip install -e tools/mtp-registry
          pip install -e tools/mtp-conformance
      - name: Run conformance
        run: |
          mtp-conformance run --level ${{ matrix.level }} --format json

  schema-validation:
    name: Schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: |
          pip install -e tools/mtp-lint
          pip install -e tools/mtp-run
          pip install -e tools/mtp-extract
          pip install -e tools/mtp-benchmark
          pip install -e tools/mtp-registry
          pip install -e tools/mtp-release
      - name: Validate all examples
        run: |
          mtp-lint validate examples/churn-risk-scoring-v0.2.yaml
          mtp-lint validate examples/valuation-report-extraction.yaml
          mtp-lint validate examples/churn-risk-scoring-execution-report-v0.2.yaml
          mtp-lint validate examples/churn-risk-scoring-mock-execution-report-v0.2.yaml
          mtp-lint validate examples/conversations/churn-risk-scoring-draft-v0.7.yaml
          mtp-benchmark validate examples/benchmarks/churn-risk-benchmark-suite-v0.7.yaml
          mtp-benchmark validate examples/benchmarks/churn-risk-benchmark-result-v0.7.yaml
          mtp-benchmark validate examples/benchmarks/mock-adapter-certification-v0.7.yaml
          mtp-registry validate-key-provider examples/registry/local-kms-key-provider-v1.0.yaml
          mtp-release validate examples/releases/mtp-provider-matrix-v1.0.yaml
          mtp-release validate examples/releases/mtp-compatibility-contract-v1.0.yaml
