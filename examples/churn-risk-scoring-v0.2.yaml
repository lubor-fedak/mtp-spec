mtp_version: "0.2"
package:
  id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
  name: "Customer Churn Risk Scoring"
  version: "1.0.0"
  created: "2026-03-09T12:00:00Z"
  updated: "2026-03-09T12:00:00Z"
  author: "analyst@example.com"
  source_platform: "claude-4.6"
  tags: ["analytics", "churn", "scoring", "saas"]

intent:
  goal: |
    Score SaaS customer accounts for churn risk on a 0-100 scale based
    on behavioral signals (login frequency decline, support ticket
    sentiment, feature adoption breadth, contract renewal proximity).
    Produce a prioritized list for the customer success team.
  context: |
    B2B SaaS company with annual contracts. Churn prediction must be
    explainable — the customer success team needs to understand WHY
    an account is flagged, not just that it is. The scoring model
    was developed iteratively through conversation, testing multiple
    signal combinations before arriving at the current weighted approach.
  success_criteria:
    - "All accounts scored without silent omission"
    - "Scores are explainable: each score has a breakdown by signal"
    - "Top-20 at-risk accounts match intuition of CS team lead (>80% overlap)"
  non_goals:
    - "This methodology does not predict exact churn date"
    - "This methodology does not automate outreach — it produces a list"
    - "This methodology does not handle freemium/self-serve accounts"

input:
  description: |
    Four data sources covering account activity, support interactions,
    feature usage, and contract status for the scoring period.
  schema:
    - field: "account_id"
      type: "string"
      description: "Unique account identifier"
      required: true
      constraints: "Must be non-empty, unique across input"
    - field: "login_data"
      type: "array"
      description: "Daily login counts per account for trailing 90 days"
      required: true
      constraints: "Array of {date, login_count} objects. Dates must be contiguous."
    - field: "support_tickets"
      type: "array"
      description: "Support tickets for trailing 90 days"
      required: true
      constraints: "Array of {date, subject, sentiment_score} objects. Sentiment: -1.0 to 1.0."
    - field: "feature_usage"
      type: "object"
      description: "Feature adoption data"
      required: true
      constraints: "Map of feature_name → {used: boolean, last_used: date}"
    - field: "contract"
      type: "object"
      description: "Contract details"
      required: true
      constraints: "Must include renewal_date and contract_value_annual"
  assumptions:
    - "Login data is complete (no gaps) for the 90-day window"
    - "Sentiment scores are pre-computed (not raw text)"
    - "Feature list is stable — no new features launched in scoring period"
  preprocessing:
    - step: 1
      action: "Validate all required fields present per account. Flag incomplete accounts."
      rationale: "Missing data silently distorts scores. Better to flag and exclude than to score with partial data."

methodology:
  approach: |
    Four-signal weighted scoring model. Each signal produces a 0-25
    sub-score. Signals are combined into a composite 0-100 churn risk
    score. The weighting was determined through iterative testing against
    historical churn data patterns discussed in the source conversation.

    This approach was chosen over ML-based prediction because: (a) the
    dataset is too small for reliable model training (<500 accounts),
    (b) the CS team requires explainable scores with per-signal breakdown,
    (c) the methodology must be transferable to enterprise AI that cannot
    run custom ML models.

  steps:
    - step: 1
      name: "Login Frequency Decline Score"
      action: |
        Compare average daily logins in the most recent 30 days vs.
        the prior 60 days. Compute decline_ratio = recent_avg / prior_avg.
        Convert to sub-score:
          decline_ratio >= 1.0  → 0 (no decline)
          decline_ratio 0.7-1.0 → linear scale 0-10
          decline_ratio 0.3-0.7 → linear scale 10-20
          decline_ratio < 0.3   → 25 (severe decline)
        If prior_avg is 0 (no logins in prior period), set sub-score to 25.
      rationale: |
        Login frequency decline is the strongest leading indicator.
        The non-linear scale was chosen because moderate decline (30%)
        is common and often benign (seasonal), while severe decline
        (>70%) almost always precedes churn. The thresholds 0.3/0.7
        were calibrated against historical patterns.
      provenance:
        source_type: "conversation"
        source_ref: "session-2026-03-07:msg-15-28"
        confidence: "high"
        notes: "Thresholds iterated 3 times in conversation. Final values based on analyst's domain knowledge of historical churn correlation."
      execution_semantics:
        on_success: "proceed"
        on_failure: "halt"
        on_deviation: "flag_and_proceed"
      decision_points:
        - condition: "Account has zero logins in entire 90-day window"
          then: "Set sub-score to 25 and flag as 'dormant_account'"
          else: "Apply standard decline calculation"
          rationale: "Dormant accounts are highest risk but need separate treatment by CS team"
      validation: |
        Sub-score must be integer 0-25 for every account.
        No null or missing sub-scores.

    - step: 2
      name: "Support Sentiment Score"
      action: |
        Compute average sentiment across all support tickets in
        the 90-day window. Convert to sub-score:
          avg_sentiment >= 0.5    → 0 (positive)
          avg_sentiment 0.0-0.5   → linear scale 0-10
          avg_sentiment -0.5-0.0  → linear scale 10-20
          avg_sentiment < -0.5    → 25 (very negative)
        If account has zero tickets, set sub-score to 5
        (mild risk — no engagement with support is a weak signal).
      rationale: |
        Negative support sentiment correlates with churn but is
        noisy. The zero-ticket default of 5 (not 0) reflects that
        complete disengagement from support can itself be a signal.
        This was a key insight from the source conversation.
      provenance:
        source_type: "conversation"
        source_ref: "session-2026-03-07:msg-30-42"
        confidence: "high"
        notes: "Zero-ticket default debated extensively. Settled on 5 after considering that 0 would mask disengaged accounts."
      execution_semantics:
        on_success: "proceed"
        on_failure: "halt"
        on_deviation: "flag_and_proceed"
      depends_on: [1]
      validation: |
        Sub-score must be integer 0-25 for every account.

    - step: 3
      name: "Feature Adoption Breadth Score"
      action: |
        Count features used in the 90-day window vs. total available
        features. Compute adoption_ratio = used / total.
        Convert to sub-score:
          adoption_ratio >= 0.6  → 0 (healthy adoption)
          adoption_ratio 0.3-0.6 → linear scale 0-15
          adoption_ratio < 0.3   → 25 (low adoption)
        Weight recently abandoned features (used before but not in
        last 30 days) with 2x penalty on the ratio denominator.
      rationale: |
        Feature breadth indicates stickiness. The abandoned-feature
        weighting was added because accounts that are narrowing their
        usage (dropping features) are higher risk than accounts that
        never adopted broadly.
      provenance:
        source_type: "conversation"
        source_ref: "session-2026-03-08:msg-5-18"
        confidence: "medium"
        notes: "Abandoned-feature weighting (2x) was suggested but not validated against historical data. Marked medium confidence."
      execution_semantics:
        on_success: "proceed"
        on_failure: "retry"
        on_deviation: "flag_and_proceed"
        max_retries: 1
      depends_on: [1]
      validation: |
        Sub-score must be integer 0-25 for every account.
        adoption_ratio must be between 0.0 and 1.0.

    - step: 4
      name: "Contract Renewal Proximity Score"
      action: |
        Compute days until contract renewal.
        Convert to sub-score:
          > 180 days  → 0
          90-180 days → linear scale 0-10
          30-90 days  → linear scale 10-20
          < 30 days   → 25
        This is a time-urgency amplifier, not a churn predictor
        itself — it ensures at-risk accounts near renewal are
        prioritized for immediate action.
      rationale: |
        Renewal proximity doesn't predict churn, but it determines
        the urgency of intervention. An account with score 60 and
        renewal in 20 days needs attention NOW, while the same score
        with renewal in 200 days has time for gradual engagement.
      provenance:
        source_type: "conversation"
        source_ref: "session-2026-03-08:msg-20-25"
        confidence: "high"
        notes: "Straightforward time-based scoring. No alternatives considered."
      execution_semantics:
        on_success: "proceed"
        on_failure: "halt"
        on_deviation: "halt"
      depends_on: [1]
      validation: |
        Sub-score must be integer 0-25 for every account.
        Days-to-renewal must not be negative.

    - step: 5
      name: "Composite Score and Ranking"
      action: |
        For each account, sum the four sub-scores:
          churn_risk = login_score + sentiment_score + feature_score + renewal_score
        Sort accounts by churn_risk descending.
        Assign risk tier:
          0-25:  "low"
          26-50: "medium"
          51-75: "high"
          76-100: "critical"
        Output the full ranked list with per-signal breakdown.
      rationale: |
        Equal weighting (25 points each) was chosen for simplicity and
        explainability. The CS team can mentally attribute why an account
        is flagged by looking at which sub-scores are elevated.
      provenance:
        source_type: "conversation"
        source_ref: "session-2026-03-08:msg-26-35"
        confidence: "high"
        notes: "Weighted alternatives considered (login 40%, others 20% each) but equal weighting preferred for explainability."
      execution_semantics:
        on_success: "proceed"
        on_failure: "halt"
        on_deviation: "halt"
      depends_on: [1, 2, 3, 4]
      validation: |
        Total score must be integer 0-100 for every account.
        Sum of sub-scores must equal total score.
        All accounts from input must appear in output (no silent drops).
        Output must be sorted by churn_risk descending.

edge_cases:
  - scenario: "Account created less than 90 days ago — incomplete data window"
    handling: "Score using available data but flag as 'short_history'. Normalize login decline to available period."
    rationale: "New accounts shouldn't be excluded but their scores are less reliable"
    severity: "warning"
    provenance:
      source_type: "conversation"
      source_ref: "session-2026-03-08:msg-38"
      confidence: "high"

  - scenario: "Account has contract_value_annual = 0 (free trial or internal)"
    handling: "Exclude from scoring. Log as excluded with reason."
    rationale: "Non-paying accounts distort the ranked list and CS team doesn't action them"
    severity: "info"
    provenance:
      source_type: "conversation"
      source_ref: "session-2026-03-08:msg-40"
      confidence: "high"

  - scenario: "Sentiment scores missing for some tickets (pre-computation failed)"
    handling: "Exclude tickets with missing sentiment. If >50% of tickets lack sentiment, flag account as 'sentiment_unreliable' and set sentiment sub-score to 12 (midpoint)"
    rationale: "Partial data is better than no data, but heavily partial data should use a neutral default"
    severity: "warning"
    provenance:
      source_type: "conversation"
      source_ref: "session-2026-03-09:msg-5-8"
      confidence: "medium"

constraints:
  - type: "accuracy"
    description: "No account may be silently omitted from the output. Every input account must appear in output as either scored or explicitly excluded with reason."
    enforcement: "Step 5 validation checks input count vs output count."
  - type: "compliance"
    description: "This methodology must not access or process any PII beyond account_id. No customer names, emails, or contact details are used in scoring."
    enforcement: "Input schema enforces this — no PII fields accepted."

output:
  description: |
    Ranked list of all accounts with composite churn risk score,
    per-signal breakdown, risk tier, and any flags.
  schema:
    - field: "account_id"
      type: "string"
      description: "Account identifier"
    - field: "churn_risk"
      type: "integer"
      description: "Composite score 0-100"
    - field: "risk_tier"
      type: "string"
      description: "low | medium | high | critical"
    - field: "breakdown"
      type: "object"
      description: "Per-signal sub-scores: login, sentiment, feature, renewal"
    - field: "flags"
      type: "array"
      description: "Any flags (dormant_account, short_history, sentiment_unreliable)"
  quality_checks:
    - check: "All input accounts present in output (scored or excluded)"
      failure_action: "Set overall_confidence to 'manual_review'"
      is_blocking: true
    - check: "All composite scores are 0-100 and equal sum of sub-scores"
      failure_action: "Set overall_confidence to 'low'"
      is_blocking: true
    - check: "Output is sorted by churn_risk descending"
      failure_action: "Re-sort and flag as deviation"
      is_blocking: false

dead_ends:
  - approach: "Weighted scoring with login frequency at 40% and others at 20%"
    reason: "CS team found the weighted model harder to interpret. When login score dominated, they couldn't understand why low-login but high-sentiment accounts were ranked lower than expected."
    lesson: "Equal weighting wins on explainability for this use case. Consider weighting only if the team is comfortable with less intuitive rankings."
    provenance:
      source_type: "conversation"
      source_ref: "session-2026-03-08:msg-26-30"

  - approach: "Including NPS survey scores as a fifth signal"
    reason: "NPS data is only available for 30% of accounts (survey response rate). Including it created a two-tier scoring system where accounts with NPS data had more accurate scores, which the CS team found confusing and unfair."
    lesson: "Only use signals with >80% data coverage to avoid tiered accuracy."
    provenance:
      source_type: "conversation"
      source_ref: "session-2026-03-07:msg-8-14"

  - approach: "Binary churn/no-churn classification instead of 0-100 scoring"
    reason: "CS team needs prioritization, not just identification. A binary classifier doesn't help when you have 50 at-risk accounts and can only reach 10 this week."
    lesson: "Scoring/ranking is more actionable than classification for resource-constrained teams."
    provenance:
      source_type: "conversation"
      source_ref: "session-2026-03-07:msg-3-6"

adaptation:
  flexibility: |
    - Sub-score thresholds (0.3/0.7 for login, etc.) can be adjusted
      based on the specific SaaS product's usage patterns
    - Risk tier boundaries (25/50/75) can be adjusted
    - Zero-ticket sentiment default (currently 5) can be adjusted
    - Feature list can be extended without changing methodology
  fixed_elements: |
    - Four-signal equal-weight structure must not be changed
    - Per-signal breakdown in output is mandatory (not just composite)
    - "Score or explicitly exclude" principle — no silent omissions
    - Non-linear login decline scale must be preserved (the 0.3/0.7
      breakpoints can move, but linear scaling across the full range
      was a dead end)
  target_requirements: |
    - Must support arithmetic operations on arrays (averaging, ratios)
    - Must support conditional logic (if/then/else scoring rules)
    - Must produce structured output (JSON or equivalent)
    - Must handle date arithmetic (days until renewal)

